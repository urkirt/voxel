<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiplayer Shooter Game</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; background: #f0f0f0; }
    canvas { background: #fff; display: block; margin: 20px auto; border: 2px solid #000; }
    #authBox, #friendsBox { margin: 20px auto; padding: 10px; border: 1px solid #333; display: inline-block; background: #eee; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
  </style>
  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <h1>Multiplayer Shooter Game</h1>

  <div id="authBox">
    <h3>Login / Sign Up</h3>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password" type="password">
    <br>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>

  <div id="friendsBox" style="display:none;">
    <h3>Friends</h3>
    <ul id="friendsList"></ul>
    <input id="friendEmail" placeholder="Friend Email">
    <button onclick="addFriend()">Add Friend</button>
  </div>

  <canvas id="gameCanvas" width="900" height="600"></canvas>

  <script>
    // ====== Firebase Setup ======
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ====== Auth Functions ======
    function login() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(() => { document.getElementById("authBox").style.display="none"; document.getElementById("friendsBox").style.display="block"; })
        .catch(alert);
    }

    function signup() {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => {
          db.collection("friends").doc(email).set({ list: [] });
          alert("Account created!");
        })
        .catch(alert);
    }

    // ====== Friends Functions ======
    auth.onAuthStateChanged(user => {
      if (!user) return;
      db.collection("friends").doc(user.email).onSnapshot(doc => {
        const list = doc.data().list || [];
        const ul = document.getElementById("friendsList");
        ul.innerHTML = "";
        list.forEach(f => { const li = document.createElement("li"); li.textContent = f; ul.appendChild(li); });
      });
    });

    function addFriend() {
      const friend = document.getElementById("friendEmail").value;
      const user = auth.currentUser;
      db.collection("friends").doc(user.email).update({
        list: firebase.firestore.FieldValue.arrayUnion(friend)
      });
      document.getElementById("friendEmail").value = "";
    }

    // ====== Game Logic ======
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 450, y: 300, speed: 4, bullets: [] };
    let keys = {};

    document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    canvas.addEventListener("click", e => {
      const rect = canvas.getBoundingClientRect();
      player.bullets.push({
        x: player.x, y: player.y,
        dx: (e.clientX - rect.left - player.x)/20,
        dy: (e.clientY - rect.top - player.y)/20
      });
    });

    function update() {
      if (keys["w"]) player.y -= player.speed;
      if (keys["s"]) player.y += player.speed;
      if (keys["a"]) player.x -= player.speed;
      if (keys["d"]) player.x += player.speed;

      player.bullets.forEach(b => { b.x += b.dx; b.y += b.dy; });
      player.bullets = player.bullets.filter(b => b.x>=0 && b.x<=canvas.width && b.y>=0 && b.y<=canvas.height);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "blue"; ctx.fillRect(player.x-10, player.y-10, 20, 20);
      ctx.fillStyle = "black";
      player.bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
</html>
