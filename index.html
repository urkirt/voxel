<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Game - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h1>Voxel Shooter</h1><p>Click to start | WASD to move</p></div>

    <!-- Use the standard JS version instead of the module version to avoid CORS issues -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // Initialize Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add Light (Crucial so objects aren't black)
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // Create Voxel Ground
        const geometry = new THREE.BoxGeometry(100, 1, 100);
        const material = new THREE.MeshPhongMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(geometry, material);
        ground.position.y = -0.5;
        scene.add(ground);

        // Player starting position
        camera.position.set(0, 1.6, 5);

        // Movement variables
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Pointer Lock
        document.body.addEventListener('click', () => document.body.requestPointerLock());

        function animate() {
            requestAnimationFrame(animate);
            
            // Simple Movement Logic
            if (document.pointerLockElement === document.body) {
                if (keys['KeyW']) camera.translateZ(-0.1);
                if (keys['KeyS']) camera.translateZ(0.1);
                if (keys['KeyA']) camera.translateX(-0.1);
                if (keys['KeyD']) camera.translateX(0.1);
                camera.position.y = 1.6; // Keep height steady
            }

            renderer.render(scene, camera);
        }
        animate();

        // Fix resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
